# ClusterIssuer: cluster-wide certificate authority config for Let's Encrypt
# "Cluster" scope means any namespace can request certs (vs namespace-scoped Issuer)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    # sync-wave "1": deploy AFTER cert-manager (wave "0") so CRDs exist first
    argocd.argoproj.io/sync-wave: "1"
    # Skip dry-run if ClusterIssuer CRD doesn't exist yet (prevents sync failure on first deploy)
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  acme:
    email: salihdaher9@gmail.com  # Let's Encrypt sends expiry warnings here
    server: https://acme-v02.api.letsencrypt.org/directory  # lets encrypt  ACME endpoint
    privateKeySecretRef:
      name: letsencrypt-prod  # K8s secret where the ACME account private key is stored , like lets encrypt account password
    solvers:
      # HTTP-01 challenge: cert-manager creates a temporary ingress to prove domain ownership
      # Let's Encrypt hits http://<domain>/.well-known/acme-challenge/<token> via nginx
      - http01:
          ingress:
            class: nginx
