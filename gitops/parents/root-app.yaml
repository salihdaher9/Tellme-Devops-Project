# Parent app for all application workloads (tellme app)
# sync-wave "1" = deployed AFTER infra (wave "0"), ensuring ingress/certs/monitoring exist first
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # Higher number = deployed after wave "0"
spec:
  project: default
  source:
    repoURL: git@gitlab.com:salihdaher9/tellme-gitops.git
    targetRevision: master
    path: apps  # Contains tellme.yaml (and any future app definitions)
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
