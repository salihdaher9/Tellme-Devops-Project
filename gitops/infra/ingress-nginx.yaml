# NGINX Ingress Controller: routes external HTTP/HTTPS traffic to K8s services
# Creates an AWS NLB (Network Load Balancer) automatically via the controller's Service type=LoadBalancer
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.10.1
    helm:
      values: |
        controller:
          replicaCount: 2  # 2 replicas for HA — traffic continues if one pod goes down
          service:
            annotations:
              # Force AWS Network Load Balancer instead of Classic Load Balancer.
              service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
              # Internet-facing entrypoint for public domain access.
              service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
              # Allow NLB nodes to distribute traffic to targets across all AZs. without it , if aza is down , we get error instead of failover to other AZs
              service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          metrics:
            enabled: true       # Expose /metrics endpoint for Prometheus to scrape
            service:
              enabled: true
            serviceMonitor:
              enabled: true     # Auto-registers with Prometheus via ServiceMonitor CRD
              additionalLabels:
                release: kube-prometheus-stack  # Must match Prometheus's serviceMonitorSelector label
          config:
            entries:
              # JSON log format: enables structured log parsing in Fluent-Bit → Elasticsearch
              log-format: '{"timestamp":"$time_iso8601","remote_addr":"$remote_addr","request_method":"$request_method","request_uri":"$request_uri","status":$status,"body_bytes_sent":$body_bytes_sent,"request_time":$request_time,"upstream_response_time":"$upstream_response_time","http_referer":"$http_referer","http_user_agent":"$http_user_agent","server_name":"$server_name","upstream_addr":"$upstream_addr"}'
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
