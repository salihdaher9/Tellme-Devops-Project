{{/* Create the tellme namespace via Helm (alternative to ArgoCD's CreateNamespace=true)
     Useful for applying labels/annotations to the namespace at creation time */}}
{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
