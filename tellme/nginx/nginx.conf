server {
    listen 80;

    # Docker's embedded DNS resolver — required when using variables in proxy_pass
    # 127.0.0.11 is Docker's internal DNS, valid=30s caches lookups for 30 seconds
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Variable-based upstream: nginx resolves "app" at request time, not at startup
    # Without this, nginx would crash if the app container isn't ready when nginx starts
    set $upstream_app app;

    add_header X-Served-By "nginx-dev";

    # Frontend: serve static files, fallback to index.html for SPA client-side routing
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;  # SPA fallback: return index.html for unknown paths
    }

    # Health check passthrough to backend
    location /health {
        proxy_pass http://$upstream_app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;          # Pass real client IP to backend
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Proxied-By "nginx-proxy";
    }

    # API reverse proxy: all /api/ requests go to the Node.js backend
    location /api/ {
        proxy_pass http://$upstream_app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Proxied-By "nginx-proxy";
    }
}