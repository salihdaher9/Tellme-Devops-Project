{{/* ExternalSecrets: pulls real credentials from AWS Secrets Manager into K8s Secrets
     Only enabled in production (externalSecrets.enabled=true in tellme-prod.yaml)
     Flow: ESO controller → reads AWS Secrets Manager → creates/updates K8s Secrets
     The created K8s Secrets are then consumed by the app deployment and MongoDB chart */}}
{{- if .Values.externalSecrets.enabled }}
{{/* --- App ExternalSecret: creates "tellme-app-secrets" K8s Secret --- */}}
{{/* The deployment.yaml references this via secrets.existingSecret */}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.app.secretName }}-external
  namespace: {{ .Release.Namespace }}
  annotations:
    # Apply ExternalSecret resources before workloads that consume generated Secrets.
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h  # Re-sync from AWS Secrets Manager every hour (picks up secret rotations)
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeRef.name }}   # "aws-secretsmanager" ClusterSecretStore
    kind: {{ .Values.externalSecrets.storeRef.kind }}
  target:
    name: {{ .Values.externalSecrets.app.secretName }}   # K8s Secret name: "tellme-app-secrets"
    creationPolicy: Owner  # ESO owns the secret lifecycle (creates and deletes it)
  # Each entry maps a key in the K8s Secret to a JSON property in the AWS secret
  data:
    - secretKey: MONGO_USER ###k8s secret name
      remoteRef:
        key: {{ .Values.externalSecrets.app.awsSecretName }} # AWS secret: "tellme/app"
        property: mongoUser        # JSON key within that secret
    - secretKey: MONGO_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.app.awsSecretName }}
        property: mongoPassword
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.app.awsSecretName }}
        property: jwtSecret
    - secretKey: MONGO_URL
      remoteRef:
        key: {{ .Values.externalSecrets.app.awsSecretName }}
        property: mongoUrl
    - secretKey: MONGO_AUTH_SOURCE
      remoteRef:
        key: {{ .Values.externalSecrets.app.awsSecretName }}
        property: mongoAuthSource
---
{{/* --- MongoDB ExternalSecret: creates "tellme-mongodb-secrets" K8s Secret --- */}}
{{/* The Bitnami MongoDB chart uses auth.existingSecret to reference this secret */}}
{{/* Secret keys must match what Bitnami expects: mongodb-root-password, mongodb-passwords, etc. */}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.mongodb.secretName }}-external
  namespace: {{ .Release.Namespace }}
  annotations:
    # Apply ExternalSecret resources before workloads that consume generated Secrets.
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeRef.name }}
    kind: {{ .Values.externalSecrets.storeRef.kind }}
  target:
    name: {{ .Values.externalSecrets.mongodb.secretName }}   # K8s Secret: "tellme-mongodb-secrets"
    creationPolicy: Owner
  data:
    - secretKey: mongodb-root-password       # Key name Bitnami chart expects for root password
      remoteRef:
        key: {{ .Values.externalSecrets.mongodb.awsSecretName }}   # AWS secret: "tellme/mongodb"
        property: rootPassword
    - secretKey: mongodb-passwords           # Key name Bitnami chart expects for user password
      remoteRef:
        key: {{ .Values.externalSecrets.mongodb.awsSecretName }}
        property: password
    - secretKey: mongodb-replica-set-key     # Shared key for replica set member authentication
      remoteRef:
        key: {{ .Values.externalSecrets.mongodb.awsSecretName }}
        property: replicaSetKey
{{- end }}
