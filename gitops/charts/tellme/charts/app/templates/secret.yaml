{{/* Only created when secrets.create=true (Strategy 2 in deployment.yaml)
     In production, this is NOT used — ExternalSecrets creates the secret instead (Strategy 1) */}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "app.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:  # stringData auto-base64-encodes values (vs data: which expects pre-encoded)
  MONGO_USER: "{{ .Values.env.mongoUser }}"
  MONGO_PASSWORD: "{{ .Values.env.mongoPassword }}"
  JWT_SECRET: "{{ .Values.env.jwtSecret }}"
{{- end }}
